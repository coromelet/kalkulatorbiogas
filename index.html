<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Pengolahan Biogas & Kebutuhan Bahan Baku Limbah</title>
    <script>
        function jalankanDeteksi() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const perangkat = (/android/i.test(userAgent)) ? 'android' : (/iphone|ipad|ipod/i.test(userAgent)) ? 'ios' : 'desktop';
            const apakahDariAplikasiAndroid = navigator.userAgent.includes("KalkulatorBiogasApp");

            if ((perangkat === 'android' && !apakahDariAplikasiAndroid) || perangkat === 'ios') {
                let templateKonten = '';
                if (perangkat === 'android') {
                    templateKonten = `
                        <h2 style="color: #d9534f; margin-bottom: 10px;">Aplikasi Khusus HP Android</h2>
                        <p style="color: #666; margin-bottom: 20px;">Silakan download dan instal aplikasi resmi kami melalui file APK di bawah ini:</p>
                        <a href="https://www.mediafire.com/file/n6urkcqxsaixox3/kalkulator-biogas.apk/file" target="_blank" style="display: inline-block; background-color: #5cb85c; color: white; padding: 14px 28px; text-decoration: none; border-radius: 8px; font-weight: bold;">Download APK Sekarang</a>`;
                } else {
                    templateKonten = `
                        <h2 style="color: #007aff; margin-bottom: 10px;">Instal di iPhone Kamu</h2>
                        <p style="color: #666;">Aplikasi ini bisa langsung ditambahkan ke layar utama iPhone:</p>
                        <ol style="text-align: left; margin: 20px 0;"><li>Ketuk tombol <b>Bagikan (Share)</b>.</li><li>Pilih <b>Tambah ke Layar Utama</b>.</li><li>Ketuk <b>Tambah</b>.</li></ol>`;
                }
                document.body.innerHTML = `<div style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; z-index: 999999; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px;"><div>${templateKonten}</div></div>`;
            }
        }
        window.addEventListener('DOMContentLoaded', jalankanDeteksi);
    </script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <style>
        :root { --bg-color: #1a3a3a; --card-bg: #ffffff; --text-title: #1a365d; --text-body: #2d3748; --text-muted: #4a5568; --primary-light: #4fd1c5; --primary-main: #234e52; --row-bg: #f0fdfa; --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: var(--text-body); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; background-color: var(--bg-color); background-image: linear-gradient(135deg, #132d2d 0%, #234e52 100%); }
        .main-wrapper { max-width: 1200px; width: 100%; }
        .dashboard-container { max-width: 800px; margin: 40px auto; text-align: center; color: white; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .menu-grid { grid-template-columns: 1fr 1fr; } }
        .menu-card { background: var(--card-bg); padding: 30px 20px; border-radius: 12px; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); transition: all 0.3s ease; }
        .menu-card:hover { transform: translateY(-5px); border: 3px solid var(--primary-light); }
        .calculator-page { display: none; }
        .table-container { background: var(--card-bg); border-radius: 10px; padding: 14px; box-shadow: var(--shadow-md); }
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 14px; }
        @media (min-width: 768px) { .grid-layout { grid-template-columns: 1fr 1fr; } }
        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; font-size: 0.82rem; }
        .data-row { background-color: var(--row-bg); }
        input { width: 100%; padding: 4px; border: 1px solid #ecc94b; border-radius: 4px; text-align: right; box-sizing: border-box; }
        .readonly { background-color: #edf2f7; color: var(--text-muted); border-color: #e2e8f0; }
        .btn-print { background-color: var(--primary-main); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="page_dashboard" class="dashboard-container">
        <h1>Kalkulator Pengolahan Biogas & Kebutuhan Bahan Baku Limbah</h1>
        <div class="menu-grid">
            <div class="menu-card" onclick="openCalculator('konversi_biogas')"><h3>Kalkulator Konversi Biogas</h3></div>
            <div class="menu-card" onclick="openCalculator('kebutuhan_limbah')"><h3>Kalkulator Kebutuhan Limbah</h3></div>
        </div>
    </div>

    <div id="page_konversi_biogas" class="calculator-page">
        <button class="btn-back" onclick="goToDashboard()">← Kembali</button>
        <div class="table-container">
            <h2 id="judul_kalkulator">Kalkulator Konversi Biogas</h2>
            <div class="grid-layout">
                <div>
                    <table>
                        <tr class="data-row"><td>Volume Efektif Reaktor</td><td><input type="number" id="vol_reaktor" value="0"></td></tr>
                    </table>
                </div>
            </div>
            <button class="btn-print" onclick="jalankanCetak()">Cetak Halaman</button>
        </div>
    </div>

    <div id="page_kebutuhan_limbah" class="calculator-page">
        <button class="btn-back" onclick="goToDashboard()">← Kembali</button>
        <div class="table-container"><h2>Kalkulator Kebutuhan Limbah Harian</h2></div>
    </div>
</div>

<script>
    function openCalculator(calcId) {
        document.getElementById('page_dashboard').style.display = 'none';
        document.getElementById('page_konversi_biogas').style.display = (calcId === 'konversi_biogas') ? 'block' : 'none';
        document.getElementById('page_kebutuhan_limbah').style.display = (calcId === 'kebutuhan_limbah') ? 'block' : 'none';
    }

    function goToDashboard() {
        document.getElementById('page_konversi_biogas').style.display = 'none';
        document.getElementById('page_kebutuhan_limbah').style.display = 'none';
        document.getElementById('page_dashboard').style.display = 'block';
    }

    // FUNGSI INI SEKARANG BERADA DI DALAM SCRIPT DAN TIDAK AKAN MUNCUL SEBAGAI TEKS
    function jalankanCetak() {
        if (window.AndroidPrinter) {
            window.AndroidPrinter.cetak();
        } else {
            window.print();
        }
    }
</script>

</body>
</html>
